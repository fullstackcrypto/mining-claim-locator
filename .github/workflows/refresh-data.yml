name: Refresh BLM Mining Claims Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  refresh:
    name: Fetch and Commit Updated BLM Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch BLM mining claims data
        id: fetch
        run: |
          cd scripts
          node fetch_blm_data.js
        continue-on-error: true

      - name: Check for data changes
        id: diff
        run: |
          if git diff --quiet frontend/src/data/blm_claims.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.fetch.outcome == 'success' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/data/blm_claims.json
          git commit -m "chore: refresh BLM mining claims data [skip ci]"
          git push
