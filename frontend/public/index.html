  <title>Mining Claim Locator</title>
  <script>
    function initGoogleMaps() {
      window.googleMapsReady = true;
      if (typeof window.onGoogleMapsReady === 'function') {
        window.onGoogleMapsReady();
      }
    }
  </script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=%REACT_APP_GOOGLE_MAPS_API_KEY%&libraries=places&callback=initGoogleMaps"
    async
    defer
  ></script>
</head>

  <div id="root"></div>
</body>
